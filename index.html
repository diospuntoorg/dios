<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dios</title>
<link rel="canonical" href="https://dios.org/" />
<meta name="robots" content="index, follow">
    

    <!-- SCHEMA ORG COMPLETO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "@id": "https://dios.org/#app",
          "name": "Dios",
          "url": "https://dios.org",
          "applicationCategory": "LifestyleApplication",
          "applicationSubCategory": "Digital Spiritual Tool",
          "operatingSystem": "All",
          "description": "Herramienta espiritual digital para la introspección mediante la escritura.",
          "inLanguage": ["es","en","fr","it","pt","ro","ca","gl","la"],
          "availableLanguage": [
            { "@type": "Language", "name": "Spanish" },
            { "@type": "Language", "name": "English" },
            { "@type": "Language", "name": "French" },
            { "@type": "Language", "name": "Italian" },
            { "@type": "Language", "name": "Portuguese" },
            { "@type": "Language", "name": "Romanian" },
            { "@type": "Language", "name": "Catalan" },
            { "@type": "Language", "name": "Galician" },
            { "@type": "Language", "name": "Latin" }
          ],
          "isAccessibleForFree": true
        },
        {
          "@type": "WebSite",
          "@id": "https://dios.org/#website",
          "url": "https://dios.org",
          "name": "Dios",
          "inLanguage": "es",
          "publisher": {
            "@id": "https://dios.org/#app"
          }
        },
        {
          "@type": "CreativeWork",
          "@id": "https://dios.org/#experience",
          "name": "Dios",
          "description": "Experiencia digital contemplativa basada en la introspección, donde el usuario escribe y encuentra significado en su propio diálogo interno.",
          "genre": "Spiritual Interactive Experience",
          "inLanguage": "es",
          "isPartOf": {
            "@id": "https://dios.org/#app"
          }
        }
      ]
    }
    </script>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0038B8;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
        }

        h1 {
            font-weight: 300;
            font-size: 1.8rem;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        input[type="text"] {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2px;
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            transition: border 0.5s ease;
            font-weight: 300;
        }

        input[type="text"]:focus {
            border: 1px solid rgba(255, 255, 255, 1);
        }

        #response {
            margin-top: 2.5rem;
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0;
            transition: opacity 1.5s ease-in;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div style="display:none;">
        Herramienta espiritual digital para la introspección mediante escritura consciente.
        Experiencia interactiva donde el usuario dialoga consigo mismo.
    </div>
    
    <div class="container">
        <h1 id="question">¿Qué estás buscando aquí?</h1>
        
        <input type="text" id="userInput" autocomplete="off" spellcheck="false" placeholder="">

        <div id="response">Al hablarte a ti, hablas conmigo.</div>
    </div>

    <script>
        const translations = {
            'es': { q: '¿Qué estás buscando aquí?', r: 'Al hablarte a ti, hablas conmigo.' },
            'la': { q: 'Quid hic quaeris?', r: 'Tibimet loquens, mecum loqueris.' },
            'pt': { q: 'O que você está procurando aqui?', r: 'Ao falar consigo mesmo, você fala comigo.' },
            'fr': { q: 'Que cherches-tu ici ?', r: 'En te parlant à toi-même, tu me parles.' },
            'it': { q: 'Cosa stai cercando qui?', r: 'Parlando a te stesso, parli con me.' },
            'ro': { q: 'Ce cauți aici?', r: 'Vorbind cu tine însuți, vorbești cu mine.' },
            'ca': { q: 'Què estàs buscant aquí?', r: 'En parlar amb tu mateix, parles amb mi.' },
            'gl': { q: 'Que estás buscando aquí?', r: 'Ao falar contigo mesmo, falas comigo.' },
            'en': { q: 'What are you looking for here?', r: 'By speaking to yourself, you speak to me.' }
        };

        const userLang = navigator.language || navigator.userLanguage; 
        const langCode = userLang.split('-')[0];
        
        const content = translations[langCode] || translations['es'];

        const questionEl = document.getElementById('question');
        const inputEl = document.getElementById('userInput');
        const responseEl = document.getElementById('response');

        questionEl.innerText = content.q;
        responseEl.innerText = content.r;

        inputEl.addEventListener('input', function() {
            if (this.value.length > 0) {
                responseEl.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
